<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Command-line styled!</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <p id="commandresp">use "help" to get information about commands</p>
      <div id="cmd">
        <form id="command">
          <span class="unselectable">></span>
          <input type="text" name="command" autofocus autocomplete="off" />
          <input type="submit" hidden />
        </form>
      </div>
    </div>
    <script src="bundle.js"></script>
  </body>
</html>
